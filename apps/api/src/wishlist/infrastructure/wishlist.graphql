scalar WishlistId

type WishlistConfig {
  hideItems: Boolean!
}

type Wishlist {
  id: WishlistId!
  title: String!
  description: String
  logoUrl: String
  ownerId: UserId!
  owner: User! @resolved
  coOwnerId: UserId
  coOwner: User @resolved
  eventIds: [EventId!]!
  events: [Event!]! @resolved
  items: [Item!]!
  config: WishlistConfig!
  createdAt: String!
  updatedAt: String!
}

type GetWishlistsPagedResponse {
  data: [Wishlist!]!
  pagination: Pagination!
}

union GetWishlistByIdResult =
  | Wishlist
  | UnauthorizedRejection
  | ForbiddenRejection
  | InternalErrorRejection
  | NotFoundRejection

union GetMyWishlistsResult =
  | GetWishlistsPagedResponse
  | UnauthorizedRejection
  | ForbiddenRejection
  | InternalErrorRejection

extend type Query {
  wishlist(id: WishlistId!): GetWishlistByIdResult
  wishlists(filters: PaginationFilters!): GetMyWishlistsResult!
}

########################################################
###############   Mutation Inputs   ####################
########################################################

input UpdateWishlistInput {
  title: String!
  description: String
}

input AddWishlistCoOwnerInput {
  userId: UserId!
}

########################################################
###############   Mutation Result Unions   #############
########################################################

union UpdateWishlistResult =
  | VoidOutput
  | ValidationRejection
  | UnauthorizedRejection
  | ForbiddenRejection
  | NotFoundRejection
  | InternalErrorRejection

union DeleteWishlistResult =
  | VoidOutput
  | ValidationRejection
  | UnauthorizedRejection
  | ForbiddenRejection
  | NotFoundRejection
  | InternalErrorRejection

union LinkWishlistToEventResult =
  | VoidOutput
  | ValidationRejection
  | UnauthorizedRejection
  | ForbiddenRejection
  | NotFoundRejection
  | InternalErrorRejection

union UnlinkWishlistFromEventResult =
  | VoidOutput
  | ValidationRejection
  | UnauthorizedRejection
  | ForbiddenRejection
  | NotFoundRejection
  | InternalErrorRejection

union AddWishlistCoOwnerResult =
  | VoidOutput
  | ValidationRejection
  | UnauthorizedRejection
  | ForbiddenRejection
  | NotFoundRejection
  | InternalErrorRejection

union RemoveWishlistCoOwnerResult =
  | VoidOutput
  | ValidationRejection
  | UnauthorizedRejection
  | ForbiddenRejection
  | NotFoundRejection
  | InternalErrorRejection

union RemoveWishlistLogoResult =
  | VoidOutput
  | ValidationRejection
  | UnauthorizedRejection
  | ForbiddenRejection
  | NotFoundRejection
  | InternalErrorRejection

extend type Mutation {
  updateWishlist(id: WishlistId!, input: UpdateWishlistInput!): UpdateWishlistResult!
  deleteWishlist(id: WishlistId!): DeleteWishlistResult!
  linkWishlistToEvent(id: WishlistId!, eventId: EventId!): LinkWishlistToEventResult!
  unlinkWishlistFromEvent(id: WishlistId!, eventId: EventId!): UnlinkWishlistFromEventResult!
  addWishlistCoOwner(id: WishlistId!, input: AddWishlistCoOwnerInput!): AddWishlistCoOwnerResult!
  removeWishlistCoOwner(id: WishlistId!): RemoveWishlistCoOwnerResult!
  removeWishlistLogo(id: WishlistId!): RemoveWishlistLogoResult!
}

########################################################
###############   Admin   ##############################
########################################################

type AdminGetWishlists {
  data: [Wishlist!]!
  pagination: Pagination!
}

input AdminWishlistPaginationFilters {
  page: Int
  limit: Int
  userId: UserId!
}

union AdminGetWishlistsResult =
  | AdminGetWishlists
  | ValidationRejection
  | UnauthorizedRejection
  | ForbiddenRejection
  | InternalErrorRejection

extend type Query {
  adminWishlists(filters: AdminWishlistPaginationFilters!): AdminGetWishlistsResult!
}
