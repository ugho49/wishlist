mutation UpdateWishlist($id: WishlistId!, $input: UpdateWishlistInput!) {
  updateWishlist(id: $id, input: $input) {
    __typename
    ... on VoidOutput {
      success
    }
    ... on ValidationRejection {
      errors {
        field
        message
      }
    }
  }
}

