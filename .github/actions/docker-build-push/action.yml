name: Docker Build and Push
description: Build a Docker image and (optionally) push it to Docker Hub

inputs:
  image:
    description: Image name without tag (e.g. ughoste/wishlist-api)
    required: true
  dockerfile:
    description: Path to the Dockerfile
    required: true
  context:
    description: Docker build context
    required: false
    default: '.'
  version:
    description: Version tag for the image
    required: true
  build-args:
    description: Build arguments (newline-separated KEY=VALUE)
    required: false
    default: ''
  username:
    description: Docker Hub username
    required: true
  password:
    description: Docker Hub password or access token
    required: true
  push:
    description: Whether to push the image to the registry
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Login to Docker Hub
      if: inputs.push == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compute tags
      id: tags
      shell: bash
      run: |
        TAGS="${{ inputs.image }}:${{ inputs.version }}"
        if [ "${{ inputs.push }}" = "true" ]; then
          TAGS="${TAGS},${{ inputs.image }}:latest"
        fi
        echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        push: ${{ inputs.push }}
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        tags: ${{ steps.tags.outputs.tags }}
        build-args: ${{ inputs.build-args }}
