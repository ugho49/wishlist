name: PR Checks

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.husky/**'
      - '.vscode/**'
      - '.idea/**'
      - 'junit_reports/**'
  workflow_call:
    outputs:
      affected_projects:
        value: ${{ jobs.install.outputs.affected_projects }}
      version:
        value: ${{ jobs.install.outputs.version }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read

jobs:
  install:
    name: Install & Compute Affected
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      nx_base: ${{ steps.nx-shas.outputs.base }}
      nx_head: ${{ steps.nx-shas.outputs.head }}
      affected_projects: ${{ steps.affected-projects.outputs.projects }}
      version: ${{ steps.compute-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch all history so Nx affected has a base to compare against.
          fetch-depth: 0

      - name: Compute version
        id: compute-version
        uses: ./.github/actions/compute-version

      - name: Setup
        uses: ./.github/actions/setup

      - name: Set Nx base and head SHAs
        id: nx-shas
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Get affected projects
        id: affected-projects
        run: |
          PROJECTS=$(yarn nx show projects --affected --base=${{ steps.nx-shas.outputs.base }} --head=${{ steps.nx-shas.outputs.head }} --exclude=@wishlist/source --json)
          echo "projects=${PROJECTS}" >> "$GITHUB_OUTPUT"
          echo "Affected projects: ${PROJECTS}"

  check:
    name: Biome Check
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run check
        run: yarn check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run affected typecheck
        run: yarn nx affected --target=typecheck --base=${{ needs.install.outputs.nx_base }} --head=${{ needs.install.outputs.nx_head }} --exclude=@wishlist/source --parallel=3 --output-style=stream

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run affected unit tests
        run: yarn nx affected --target=test --base=${{ needs.install.outputs.nx_base }} --head=${{ needs.install.outputs.nx_head }} --exclude=@wishlist/source --parallel=3 --output-style=stream

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: junit_reports/unit/
          retention-days: 7

  test-int:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      # Testcontainers runs natively against the runner's Docker daemon,
      # so no SSH tunnel / autoforward is required (unlike CircleCI).
      - name: Run affected integration tests
        run: yarn nx affected --target=test:int --base=${{ needs.install.outputs.nx_base }} --head=${{ needs.install.outputs.nx_head }} --exclude=@wishlist/source --parallel=3 --output-style=stream

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: junit_reports/integration/
          retention-days: 7

  check-codegen:
    name: Check API Codegen
    runs-on: ubuntu-latest
    needs: install
    if: contains(needs.install.outputs.affected_projects, '"api"')
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run codegen
        run: yarn nx run api:codegen

      - name: Check schema.graphql is up to date
        run: |
          if git diff --exit-code apps/api/schema.graphql; then
            echo "schema.graphql is up to date"
          else
            echo "Error: schema.graphql is not up to date. Some GraphQL files were modified without running codegen."
            echo "--> Please run 'yarn nx run api:codegen' locally and commit the changes."
            exit 1
          fi

  docker-api-build:
    name: Docker API Build
    runs-on: ubuntu-latest
    needs: install
    if: contains(needs.install.outputs.affected_projects, '"api"')
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push API image
        uses: ./.github/actions/docker-build-push
        with:
          image: ughoste/wishlist-api
          dockerfile: apps/api/Dockerfile
          version: ${{ needs.install.outputs.version }}
          build-args: API_VERSION=${{ needs.install.outputs.version }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # Only push when running on main (i.e. via the Deployments workflow).
          push: ${{ github.ref == 'refs/heads/main' }}

  build-front:
    name: Build Front
    runs-on: ubuntu-latest
    needs: install
    if: contains(needs.install.outputs.affected_projects, '"front"')
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build front
        env:
          VITE_APP_VERSION: ${{ needs.install.outputs.version }}
        run: |
          yarn nx run front:codegen
          yarn nx build front

      # Uploaded so the Deploy Front workflow (same run) can deploy it without rebuilding.
      - name: Upload front build
        uses: actions/upload-artifact@v4
        with:
          name: front-dist
          path: dist/apps/front
          retention-days: 7
