name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: write

jobs:
  claude-review:
    name: Claude Code Review
    if: github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Minimize previous Claude reviews
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            --jq '.[] | select(.user.login == "claude[bot]") | .node_id' \
          | while read node_id; do
              gh api graphql -f query='
                mutation($id: ID!) {
                  minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) {
                    minimizedComment { isMinimized }
                  }
                }' -f id="$node_id" || true
            done

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          claude_args: '--allowedTools "Read,Glob,Grep,Bash(gh pr *),Bash(gh api *),Bash(git diff *),Bash(git log *),Bash(git show *)" --model claude-opus-4-8'
          prompt: |
            Please analyze the changes in this PR and focus on identifying critical issues related to:
            - Potential bugs or issues
            - Performance
            - Security
            - Correctness

            If critical issues are found, list them in a few short bullet points. If no critical issues are found, do not write anything. Provide a simple approval.
            Sign off with a checkbox emoji: ✅ (approved) or ❌ (issues found).

            Keep your response concise. Only highlight critical issues that must be addressed before merging. Skip detailed style or minor suggestions unless they impact performance, security, or correctness and the flow logic.
            Post your review using `gh pr review ${{ github.event.pull_request.number }}` with either --approve or --comment flag and a --body containing your review
